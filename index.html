<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捷運小車長 - 任務大廳</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #e8f5e9; /* 清新的捷運綠底色 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        .title {
            font-size: 26px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .btn-link {
            display: block;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            padding: 25px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-link:active {
            transform: scale(0.96);
        }
        /* 早安按鈕樣式 */
        .btn-morning {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }
        /* 晚安按鈕樣式 */
        .btn-evening {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
        }
        .icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        .sub-text {
            display: block;
            font-size: 15px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 8px;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .train-animation {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="train-animation">🚉</div>
        <div class="title">捷運小車長大廳</div>
        <div class="subtitle">歡迎光臨！這是為我們家 4 歲專屬小車長設計的挑戰路線。請選擇現在要搭乘的列車：</div>
        
        <a href="morning.html" class="btn-link btn-morning">
            <span class="icon">☀️</span>
            早安特快車
            <span class="sub-text">往 北屯總站 ⬆️</span>
        </a>
        
        <a href="evening.html" class="btn-link btn-evening">
            <span class="icon">🌙</span>
            晚安區間車
            <span class="sub-text">往 高鐵臺中站 ⬇️</span>
        </a>
    </div>

</body>
</html>
